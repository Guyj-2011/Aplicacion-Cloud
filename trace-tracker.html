<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>TRACE — Rastreador Satelital</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230B0F14'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%23D4A054' stroke-width='4'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%234FD1C5'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#0a0e13; --panel-edge:rgba(232,228,218,0.08);
    --brass:#D4A054; --teal:#4FD1C5; --alert:#E2574C; --paper:#E8E4DA; --muted:#7C8894;
    --mono: ui-monospace, 'SF Mono', 'Roboto Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; width:100%; height:100%; background:var(--ink); color:var(--paper);
    font-family:var(--sans); overflow:hidden; position:fixed; inset:0; }
  #map{ position:absolute; inset:0; z-index:1; filter:saturate(1.08) contrast(1.05); background:#0a0e13; }
  .leaflet-container{ background:#0a0e13; }
  .leaflet-control-attribution{ background:rgba(10,14,19,0.6)!important; color:var(--muted)!important; font-size:9px!important; }
  .leaflet-control-attribution a{ color:var(--muted)!important; }
  .leaflet-control-zoom{ display:none; }

  .topbar{ position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:flex-start; justify-content:space-between;
    padding: max(16px, env(safe-area-inset-top)) 16px 0 16px; pointer-events:none; }
  .wordmark{ display:flex; flex-direction:column; gap:2px; padding:10px 14px; border-radius:14px;
    background:rgba(10,14,19,0.55); backdrop-filter:blur(14px) saturate(1.4); border:1px solid var(--panel-edge); }
  .wordmark .title{ font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:4px; color:var(--paper); }
  .wordmark .eyebrow{ font-size:9px; letter-spacing:2px; color:var(--brass); text-transform:uppercase; }
  .status-pill{ pointer-events:auto; display:flex; align-items:center; gap:7px; padding:9px 13px; border-radius:999px;
    background:rgba(10,14,19,0.55); backdrop-filter:blur(14px) saturate(1.4); border:1px solid var(--panel-edge);
    font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }
  .status-dot{ width:7px; height:7px; border-radius:50%; background:var(--muted); }
  .status-pill.live .status-dot{ background:var(--teal); box-shadow:0 0 8px var(--teal); animation:pulse 1.4s ease-in-out infinite; }
  .status-pill.live{ color:var(--teal); border-color:rgba(79,209,197,0.35); }
  .status-pill.replay .status-dot{ background:var(--brass); box-shadow:0 0 8px var(--brass); animation:pulse 1.4s ease-in-out infinite; }
  .status-pill.replay{ color:var(--brass); border-color:rgba(212,160,84,0.35); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  .coords{ position:absolute; top:78px; left:16px; z-index:20; padding:7px 12px; border-radius:10px;
    background:rgba(10,14,19,0.5); backdrop-filter:blur(10px); border:1px solid var(--panel-edge);
    font-family:var(--mono); font-size:10.5px; color:var(--muted); letter-spacing:0.5px; opacity:0.5; transition:opacity 0.3s; }

  .error-banner{ position:absolute; top:132px; left:16px; right:16px; z-index:25; padding:12px 14px; border-radius:12px;
    background:rgba(226,87,76,0.15); backdrop-filter:blur(14px); border:1px solid rgba(226,87,76,0.4);
    color:#ffd9d5; font-size:12.5px; line-height:1.5; display:none; }
  .error-banner.show{ display:block; }
  .error-banner b{ color:var(--alert); }

  .map-notice{ position:absolute; top:132px; left:16px; right:16px; z-index:24; padding:12px 14px; border-radius:12px;
    background:rgba(212,160,84,0.15); backdrop-filter:blur(14px); border:1px solid rgba(212,160,84,0.4);
    color:#ffe9c9; font-size:12px; line-height:1.5; display:none; }
  .map-notice.show{ display:block; }

  .letterbox{ position:absolute; left:0; right:0; height:0; background:#000; z-index:15; transition:height 0.5s ease; pointer-events:none; }
  .letterbox.top{ top:0; } .letterbox.bottom{ bottom:0; }
  .replay-active .letterbox{ height:38px; }
  .replay-active .letterbox.top{ height:calc(38px + env(safe-area-inset-top)); }

  .hud{ position:absolute; left:0; right:0; bottom:0; z-index:20; padding: 14px 14px max(16px, env(safe-area-inset-bottom)) 14px; }
  .hud-card{ background:linear-gradient(180deg, rgba(18,24,32,0.75), rgba(10,14,19,0.9));
    backdrop-filter:blur(20px) saturate(1.3); border:1px solid var(--panel-edge); border-radius:22px;
    padding:16px 16px 14px 16px; box-shadow:0 -8px 30px rgba(0,0,0,0.4); }
  .stats-row{ display:flex; justify-content:space-around; margin-bottom:14px; }
  .stat{ text-align:center; flex:1; }
  .stat .val{ font-family:var(--mono); font-weight:700; font-size:22px; letter-spacing:-0.5px; color:var(--paper); font-variant-numeric:tabular-nums; }
  .stat.primary .val{ color:var(--brass); font-size:26px; }
  .stat .lbl{ font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-top:3px; }
  .divider-v{ width:1px; background:var(--panel-edge); margin:2px 4px; }

  .replay-progress{ height:3px; background:rgba(255,255,255,0.08); border-radius:2px; overflow:hidden; margin-bottom:14px; display:none; }
  .replay-progress.show{ display:block; }
  .replay-progress-fill{ height:100%; width:0%; background:var(--brass); transition:width 0.1s linear; }

  .controls-row{ display:flex; align-items:center; justify-content:center; gap:14px; }
  .btn-record{ width:64px; height:64px; border-radius:50%; border:3px solid var(--brass);
    background:rgba(212,160,84,0.12); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; flex-shrink:0; }
  .btn-record:active{ transform:scale(0.94); }
  .btn-record .inner{ width:26px; height:26px; border-radius:50%; background:var(--brass); transition:all 0.25s; }
  .btn-record.recording{ border-color:var(--alert); background:rgba(226,87,76,0.14); }
  .btn-record.recording .inner{ width:22px; height:22px; border-radius:6px; background:var(--alert); }

  .btn-sec{ font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:0.5px; padding:14px 18px; border-radius:16px;
    border:1px solid var(--panel-edge); background:rgba(255,255,255,0.04); color:var(--paper); cursor:pointer; transition:all 0.2s;
    white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .btn-sec:active{ transform:scale(0.96); background:rgba(255,255,255,0.09); }
  .btn-sec.accent{ color:var(--teal); border-color:rgba(79,209,197,0.3); }
  .btn-sec.ghost{ color:var(--muted); }

  .hint{ text-align:center; font-size:11px; color:var(--muted); margin-top:12px; letter-spacing:0.3px; }

  .speed-toggle{ display:flex; gap:6px; justify-content:center; margin-top:10px; }
  .speed-btn{ font-family:var(--mono); font-size:10.5px; padding:5px 11px; border-radius:8px; border:1px solid var(--panel-edge);
    background:transparent; color:var(--muted); cursor:pointer; }
  .speed-btn.active{ color:var(--brass); border-color:var(--brass); background:rgba(212,160,84,0.1); }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="map"></div>
<div class="letterbox top"></div>
<div class="letterbox bottom"></div>

<div class="topbar">
  <div class="wordmark">
    <div class="title">TRACE</div>
    <div class="eyebrow">Rastreo satelital</div>
  </div>
  <div class="status-pill" id="statusPill">
    <div class="status-dot"></div>
    <span id="statusText">Inactivo</span>
  </div>
</div>

<div class="coords" id="coordsReadout">— · —</div>
<div class="error-banner" id="errorBanner"></div>
<div class="map-notice" id="mapNotice"></div>

<div class="hud">
  <div class="hud-card">
    <div class="stats-row">
      <div class="stat primary">
        <div class="val" id="statDistance">0 m</div>
        <div class="lbl">Distancia</div>
      </div>
      <div class="divider-v"></div>
      <div class="stat">
        <div class="val" id="statTime">00:00</div>
        <div class="lbl">Tiempo</div>
      </div>
      <div class="divider-v"></div>
      <div class="stat">
        <div class="val" id="statPace">--:--</div>
        <div class="lbl">Ritmo /km</div>
      </div>
    </div>

    <div class="replay-progress" id="replayProgress">
      <div class="replay-progress-fill" id="replayProgressFill"></div>
    </div>

    <div class="controls-row" id="controlsRow">
      <div class="btn-record" id="btnRecord"><div class="inner"></div></div>
    </div>

    <div class="speed-toggle hidden" id="speedToggle">
      <button class="speed-btn" data-speed="1">1×</button>
      <button class="speed-btn active" data-speed="2">2×</button>
      <button class="speed-btn" data-speed="4">4×</button>
    </div>

    <div class="hint" id="hintText">Toca para iniciar el rastreo de tu recorrido</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){
  'use strict';

  // ---------------- Map setup ----------------
  var map = L.map('map', { zoomControl:false, attributionControl:true }).setView([20, 0], 2.3);

  var satLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri', maxZoom: 20
  });
  var fallbackLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19, subdomains: 'abc'
  });
  satLayer.addTo(map);
  var fallbackActive = false, tileErrorCount = 0;
  satLayer.on('tileerror', function(){
    tileErrorCount++;
    if(tileErrorCount >= 4 && !fallbackActive){
      fallbackActive = true;
      map.removeLayer(satLayer);
      fallbackLayer.addTo(map);
      showMapNotice('No se pudieron cargar las imágenes satelitales, así que se muestra un mapa estándar en su lugar.');
    }
  });
  satLayer.on('tileload', function(){ tileErrorCount = Math.max(0, tileErrorCount-1); });
  function showMapNotice(msg){
    var el = document.getElementById('mapNotice');
    if(el){ el.textContent = msg; el.classList.add('show'); }
  }
  setTimeout(function(){ map.invalidateSize(); }, 300);
  setTimeout(function(){ map.invalidateSize(); }, 1200);
  window.addEventListener('resize', function(){ map.invalidateSize(); });
  window.addEventListener('orientationchange', function(){ setTimeout(function(){ map.invalidateSize(); }, 300); });

  var routeLine = L.polyline([], { color:'#4FD1C5', weight:4, opacity:0.9, lineCap:'round', lineJoin:'round' }).addTo(map);
  var glowLine = L.polyline([], { color:'#4FD1C5', weight:10, opacity:0.18, lineCap:'round', lineJoin:'round' }).addTo(map);

  var liveMarkerIcon = L.divIcon({
    className:'', html:'<div style="width:16px;height:16px;border-radius:50%;background:#4FD1C5;border:3px solid #0a0e13;box-shadow:0 0 12px #4FD1C5;"></div>',
    iconSize:[16,16], iconAnchor:[8,8]
  });
  var replayMarkerIcon = L.divIcon({
    className:'', html:'<div style="width:18px;height:18px;border-radius:50%;background:#D4A054;border:3px solid #0a0e13;box-shadow:0 0 14px #D4A054;"></div>',
    iconSize:[18,18], iconAnchor:[9,9]
  });
  var liveMarker = null;
  var accuracyCircle = null;

  var MAX_ACCEPT_ACCURACY = 30; // meters — fixes worse than this are ignored for the route
  var MAX_PLAUSIBLE_SPEED = 6;  // m/s (~21.6 km/h) — filters GPS teleport spikes while walking/running

  // ---------------- State ----------------
  var STATE = 'idle';
  var watchId = null;
  var route = [];
  var startTime = null;
  var totalDistance = 0;
  var timerInterval = null;
  var replaySpeed = 2;
  var replayAnimId = null;
  var cumulativeDist = [0];

  var MIN_POINT_DIST = 3;
  var REPLAY_BASE_MS = 20000;

  var btnRecord = document.getElementById('btnRecord');
  var controlsRow = document.getElementById('controlsRow');
  var statDistance = document.getElementById('statDistance');
  var statTime = document.getElementById('statTime');
  var statPace = document.getElementById('statPace');
  var statusPill = document.getElementById('statusPill');
  var statusText = document.getElementById('statusText');
  var coordsReadout = document.getElementById('coordsReadout');
  var errorBanner = document.getElementById('errorBanner');
  var hintText = document.getElementById('hintText');
  var speedToggle = document.getElementById('speedToggle');
  var replayProgress = document.getElementById('replayProgress');
  var replayProgressFill = document.getElementById('replayProgressFill');
  var bodyEl = document.body;

  function haversine(a, b){
    var R = 6371000;
    var dLat = (b.lat-a.lat) * Math.PI/180;
    var dLng = (b.lng-a.lng) * Math.PI/180;
    var la1 = a.lat * Math.PI/180, la2 = b.lat * Math.PI/180;
    var h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLng/2)**2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }
  function fmtDistance(m){ if(m < 1000) return Math.round(m) + ' m'; return (m/1000).toFixed(2) + ' km'; }
  function fmtTime(ms){
    var s = Math.floor(ms/1000);
    var h = Math.floor(s/3600), mm = Math.floor((s%3600)/60), ss = s%60;
    if(h>0) return pad(h)+':'+pad(mm)+':'+pad(ss);
    return pad(mm)+':'+pad(ss);
  }
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function fmtPace(distM, timeMs){
    if(distM < 30) return '--:--';
    var km = distM/1000;
    var minPerKm = (timeMs/60000) / km;
    if(!isFinite(minPerKm) || minPerKm <= 0) return '--:--';
    var m = Math.floor(minPerKm), s = Math.round((minPerKm - m)*60);
    if(s===60){ m++; s=0; }
    return m+':'+pad(s);
  }
  function fmtCoord(lat, lng){
    var latDir = lat>=0 ? 'N' : 'S', lngDir = lng>=0 ? 'E' : 'W';
    return Math.abs(lat).toFixed(4)+'° '+latDir+',  '+Math.abs(lng).toFixed(4)+'° '+lngDir;
  }
  function showError(msg){ errorBanner.innerHTML = msg; errorBanner.classList.add('show'); }
  function clearError(){ errorBanner.classList.remove('show'); }
  function setStatus(mode){
    statusPill.className = 'status-pill';
    if(mode==='live'){ statusPill.classList.add('live'); statusText.textContent='En vivo'; }
    else if(mode==='replay'){ statusPill.classList.add('replay'); statusText.textContent='Reproducción'; }
    else { statusText.textContent='Inactivo'; }
  }

  function startRecording(){
    if(!navigator.geolocation){
      showError('<b>Sin soporte de geolocalización.</b> Tu navegador no permite acceder al GPS.');
      return;
    }
    clearError();
    route = []; cumulativeDist = [0]; totalDistance = 0; startTime = Date.now();
    routeLine.setLatLngs([]); glowLine.setLatLngs([]);

    STATE = 'recording';
    btnRecord.classList.add('recording');
    setStatus('live');
    hintText.textContent = 'Rastreando tu recorrido…';

    navigator.geolocation.getCurrentPosition(function(pos){
      map.setView([pos.coords.latitude, pos.coords.longitude], 17, { animate:true });
    }, function(){}, { enableHighAccuracy:true, timeout:8000 });

    watchId = navigator.geolocation.watchPosition(onPosition, onGeoError, {
      enableHighAccuracy:true, maximumAge:1000, timeout:15000
    });
    timerInterval = setInterval(updateTimeDisplay, 1000);
  }

  function onPosition(pos){
    var lat = pos.coords.latitude, lng = pos.coords.longitude;
    var accuracy = pos.coords.accuracy || 999;
    coordsReadout.textContent = fmtCoord(lat, lng) + '  ±' + Math.round(accuracy) + 'm';
    coordsReadout.style.opacity = '1';

    if(!liveMarker){ liveMarker = L.marker([lat,lng], { icon: liveMarkerIcon }).addTo(map); }
    else { liveMarker.setLatLng([lat,lng]); }

    if(!accuracyCircle){
      accuracyCircle = L.circle([lat,lng], { radius:accuracy, color:'#4FD1C5', weight:1, opacity:0.25, fillColor:'#4FD1C5', fillOpacity:0.06 }).addTo(map);
    } else {
      accuracyCircle.setLatLng([lat,lng]); accuracyCircle.setRadius(accuracy);
    }

    // Ignore unreliable fixes entirely for the recorded route
    if(accuracy > MAX_ACCEPT_ACCURACY){
      hintText.textContent = 'Buscando señal GPS más precisa (±' + Math.round(accuracy) + 'm)…';
      return;
    }

    var now = Date.now() - startTime;
    var point = { lat:lat, lng:lng, t: now };
    if(route.length === 0){
      route.push(point); cumulativeDist = [0];
      routeLine.addLatLng([lat,lng]); glowLine.addLatLng([lat,lng]);
    } else {
      var last = route[route.length-1];
      var d = haversine(last, point);
      var dt = Math.max((now - last.t) / 1000, 0.001);
      var impliedSpeed = d / dt;

      // Reject GPS "teleport" spikes: a jump too large for the elapsed time to be real movement
      if(impliedSpeed > MAX_PLAUSIBLE_SPEED && d > accuracy){
        return;
      }
      if(d >= MIN_POINT_DIST){
        totalDistance += d;
        route.push(point);
        cumulativeDist.push(totalDistance);
        routeLine.addLatLng([lat,lng]);
        glowLine.addLatLng([lat,lng]);
        hintText.textContent = 'Rastreando tu recorrido…';
      }
    }
    map.panTo([lat,lng], { animate:true, duration:0.6 });
    statDistance.textContent = fmtDistance(totalDistance);
    statPace.textContent = fmtPace(totalDistance, now);
  }

  function onGeoError(err){
    var msg = 'No se pudo acceder a tu ubicación.';
    if(err.code === 1) msg = '<b>Permiso denegado.</b> Activa la ubicación para este sitio en los ajustes de tu navegador.';
    else if(err.code === 2) msg = '<b>Ubicación no disponible.</b> Verifica tu señal GPS o conexión.';
    else if(err.code === 3) msg = '<b>Tiempo de espera agotado</b> buscando tu ubicación. Intenta de nuevo.';
    showError(msg);
  }

  function updateTimeDisplay(){
    if(STATE !== 'recording') return;
    statTime.textContent = fmtTime(Date.now() - startTime);
    statPace.textContent = fmtPace(totalDistance, Date.now()-startTime);
  }

  function stopRecording(){
    if(watchId !== null){ navigator.geolocation.clearWatch(watchId); watchId = null; }
    if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
    STATE = 'stopped';
    btnRecord.classList.remove('recording');
    setStatus('idle');
    coordsReadout.style.opacity = '0.5';

    if(route.length < 2){
      hintText.textContent = 'Recorrido muy corto para reproducir. Inicia uno nuevo cuando quieras.';
      renderIdleControls();
      return;
    }
    var bounds = routeLine.getBounds();
    if(bounds.isValid()) map.fitBounds(bounds, { padding:[60,60] });
    hintText.textContent = 'Recorrido guardado. Puedes reproducirlo o iniciar uno nuevo.';
    renderStoppedControls();
  }

  function renderIdleControls(){
    controlsRow.innerHTML = '';
    controlsRow.appendChild(btnRecord);
    speedToggle.classList.add('hidden');
    replayProgress.classList.remove('show');
  }
  function renderStoppedControls(){
    controlsRow.innerHTML = '';
    var playBtn = document.createElement('button');
    playBtn.className = 'btn-sec accent';
    playBtn.innerHTML = '▶&nbsp; Reproducir recorrido';
    playBtn.onclick = startReplay;
    var newBtn = document.createElement('button');
    newBtn.className = 'btn-sec ghost';
    newBtn.innerHTML = '↺&nbsp; Nuevo';
    newBtn.onclick = resetAll;
    controlsRow.appendChild(playBtn);
    controlsRow.appendChild(newBtn);
    speedToggle.classList.remove('hidden');
  }
  function renderReplayingControls(){
    controlsRow.innerHTML = '';
    var stopBtn = document.createElement('button');
    stopBtn.className = 'btn-sec';
    stopBtn.style.color = '#E2574C';
    stopBtn.style.borderColor = 'rgba(226,87,76,0.35)';
    stopBtn.innerHTML = '■&nbsp; Detener reproducción';
    stopBtn.onclick = stopReplay;
    controlsRow.appendChild(stopBtn);
  }

  function resetAll(){
    route = []; cumulativeDist = [0]; totalDistance = 0;
    routeLine.setLatLngs([]); glowLine.setLatLngs([]);
    if(liveMarker){ map.removeLayer(liveMarker); liveMarker = null; }
    if(accuracyCircle){ map.removeLayer(accuracyCircle); accuracyCircle = null; }
    statDistance.textContent = '0 m'; statTime.textContent = '00:00'; statPace.textContent = '--:--';
    coordsReadout.style.opacity = '0.5';
    STATE = 'idle'; setStatus('idle');
    hintText.textContent = 'Toca para iniciar el rastreo de tu recorrido';
    renderIdleControls();
  }

  function startReplay(){
    if(route.length < 2) return;
    STATE = 'replaying'; setStatus('replay');
    bodyEl.classList.add('replay-active');
    renderReplayingControls();
    replayProgress.classList.add('show');
    if(liveMarker){ map.removeLayer(liveMarker); liveMarker = null; }
    routeLine.setLatLngs([]); glowLine.setLatLngs([]);
    var replayMarker = L.marker([route[0].lat, route[0].lng], { icon: replayMarkerIcon }).addTo(map);
    var bounds = L.latLngBounds(route.map(function(p){ return [p.lat,p.lng]; }));
    map.fitBounds(bounds, { padding:[80,80] });
    var totalT = route[route.length-1].t || 1;
    var duration = REPLAY_BASE_MS / replaySpeed;
    var animStart = performance.now();

    function frame(now){
      if(STATE !== 'replaying') return;
      var elapsed = now - animStart;
      var progress = Math.min(elapsed / duration, 1);
      var targetT = progress * totalT;
      var idx = 0;
      while(idx < route.length-1 && route[idx+1].t < targetT) idx++;
      var p0 = route[idx], p1 = route[Math.min(idx+1, route.length-1)];
      var segT = p1.t - p0.t;
      var localP = segT > 0 ? (targetT - p0.t) / segT : 0;
      var lat = p0.lat + (p1.lat - p0.lat) * localP;
      var lng = p0.lng + (p1.lng - p0.lng) * localP;
      var dist = cumulativeDist[idx] + (cumulativeDist[Math.min(idx+1,cumulativeDist.length-1)] - cumulativeDist[idx]) * localP;

      replayMarker.setLatLng([lat,lng]);
      routeLine.addLatLng([lat,lng]);
      glowLine.addLatLng([lat,lng]);
      map.panTo([lat,lng], { animate:false });

      statDistance.textContent = fmtDistance(dist);
      statTime.textContent = fmtTime(targetT);
      statPace.textContent = fmtPace(dist, targetT);
      replayProgressFill.style.width = (progress*100)+'%';

      if(progress < 1){ replayAnimId = requestAnimationFrame(frame); }
      else { finishReplay(replayMarker); }
    }
    replayAnimId = requestAnimationFrame(frame);
  }

  function finishReplay(marker){
    STATE = 'stopped'; setStatus('idle');
    bodyEl.classList.remove('replay-active');
    hintText.textContent = 'Reproducción finalizada. Puedes verla de nuevo o iniciar un recorrido nuevo.';
    if(marker) map.removeLayer(marker);
    routeLine.setLatLngs(route.map(function(p){return [p.lat,p.lng];}));
    glowLine.setLatLngs(route.map(function(p){return [p.lat,p.lng];}));
    statDistance.textContent = fmtDistance(totalDistance);
    statTime.textContent = fmtTime(route[route.length-1].t);
    statPace.textContent = fmtPace(totalDistance, route[route.length-1].t);
    renderStoppedControls();
  }

  function stopReplay(){
    if(replayAnimId) cancelAnimationFrame(replayAnimId);
    STATE = 'stopped'; setStatus('idle');
    bodyEl.classList.remove('replay-active');
    replayProgress.classList.remove('show');
    routeLine.setLatLngs(route.map(function(p){return [p.lat,p.lng];}));
    glowLine.setLatLngs(route.map(function(p){return [p.lat,p.lng];}));
    statDistance.textContent = fmtDistance(totalDistance);
    statTime.textContent = fmtTime(route[route.length-1].t);
    statPace.textContent = fmtPace(totalDistance, route[route.length-1].t);
    hintText.textContent = 'Reproducción detenida. Puedes verla de nuevo o iniciar un recorrido nuevo.';
    renderStoppedControls();
  }

  btnRecord.addEventListener('click', function(){
    if(STATE === 'idle' || STATE === 'stopped'){ startRecording(); }
    else if(STATE === 'recording'){ stopRecording(); }
  });
  speedToggle.addEventListener('click', function(e){
    var btn = e.target.closest('.speed-btn');
    if(!btn) return;
    replaySpeed = parseFloat(btn.dataset.speed);
    Array.prototype.forEach.call(speedToggle.querySelectorAll('.speed-btn'), function(b){
      b.classList.toggle('active', b===btn);
    });
  });

})();
</script>
</body>
</html>
